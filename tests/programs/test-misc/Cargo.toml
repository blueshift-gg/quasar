[package]
name = "quasar-test-misc"
version = "0.1.0"
publish = false
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
doctest = false

[lints]
workspace = true

[features]
default = ["alloc", "debug"]
client = []
debug = []
alloc = []
idl-build = ["quasar-lang/idl-build"]

[dependencies]
quasar-lang = { path = "../../../lang" }
quasar-derive = { path = "../../../derive" }

[dev-dependencies]
quasar-test = { path = "../../../test" }
