name: Fuzz

# Untrusted-input decode fuzzing (quasar-lang/fuzz). Deliberately kept OFF the
# required PR path: it runs nightly on a schedule, on manual dispatch, and on a
# PR only when that PR is explicitly labeled `fuzz`. A crash here is a security
# finding — STOP, `cargo fuzz tmin`, and report before merging.
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}
  pull_request:
    types: [labeled, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz_inventory:
    name: Fuzz Target Inventory
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'fuzz'))
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - uses: actions/checkout@v6
      - name: Read maintained targets from the fuzz manifest
        id: targets
        run: |
          targets="$(
            cargo metadata \
              --manifest-path lang/fuzz/Cargo.toml \
              --format-version 1 \
              --no-deps \
              --locked \
              | jq -c '[.packages[].targets[] | select(.kind | index("bin")) | .name] | sort'
          )"
          if [ "$(jq 'length' <<< "$targets")" -eq 0 ]; then
            echo "No maintained fuzz targets found" >&2
            exit 1
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  fuzz:
    name: Fuzz (${{ matrix.target }})
    needs: fuzz_inventory
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.fuzz_inventory.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-fuzz-registry-v1-${{ hashFiles('lang/fuzz/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-registry-v1-
      - name: Get nightly toolchain version
        id: nightly
        run: echo "version=$(make nightly-version)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.nightly.outputs.version }}
      - name: Print fuzz toolchain
        run: |
          rustup run "${{ steps.nightly.outputs.version }}" rustc --version
          rustup run "${{ steps.nightly.outputs.version }}" cargo --version
      - name: Install cargo-fuzz
        run: cargo +${{ steps.nightly.outputs.version }} install cargo-fuzz --locked
      - name: Fuzz ${{ matrix.target }} (300s)
        working-directory: lang
        run: cargo +${{ steps.nightly.outputs.version }} fuzz run ${{ matrix.target }} -- -max_total_time=300
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: lang/fuzz/artifacts/
