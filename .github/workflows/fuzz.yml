name: Fuzz

# Untrusted-input decode fuzzing (quasar-lang/fuzz). Deliberately kept OFF the
# required PR path: it runs nightly on a schedule, on manual dispatch, and on a
# PR only when that PR is explicitly labeled `fuzz`. A crash here is a security
# finding — STOP, `cargo fuzz tmin`, and report before merging.
on:
  schedule:
    # Nightly short run (300s per target) and a weekly long soak (Saturday,
    # 1800s per target); the run length is selected per-schedule below.
    - cron: '0 4 * * *'
    - cron: '0 6 * * 6'
  workflow_dispatch: {}
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz_inventory:
    name: Fuzz Target Inventory
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'fuzz'))
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Read maintained targets from the fuzz manifest
        id: targets
        run: |
          targets="$(
            cargo metadata \
              --manifest-path lang/fuzz/Cargo.toml \
              --format-version 1 \
              --no-deps \
              --locked \
              | jq -c '[.packages[].targets[] | select(.kind | index("bin")) | .name] | sort'
          )"
          if [ "$(jq 'length' <<< "$targets")" -eq 0 ]; then
            echo "No maintained fuzz targets found" >&2
            exit 1
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  fuzz:
    name: Fuzz (${{ matrix.target }})
    needs: fuzz_inventory
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.fuzz_inventory.outputs.targets) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Get pinned tool versions
        id: versions
        run: |
          echo "nightly=$(make nightly-version)" >> "$GITHUB_OUTPUT"
          echo "cargo_fuzz=$(make cargo-fuzz-version)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ steps.versions.outputs.nightly }}
      - name: Install pinned cargo-fuzz
        env:
          NIGHTLY: ${{ steps.versions.outputs.nightly }}
          CARGO_FUZZ: ${{ steps.versions.outputs.cargo_fuzz }}
        run: >-
          cargo +"$NIGHTLY" install cargo-fuzz
          --version "$CARGO_FUZZ" --locked
      - name: Print fuzz toolchain
        env:
          NIGHTLY: ${{ steps.versions.outputs.nightly }}
        run: |
          rustup run "$NIGHTLY" rustc --version
          rustup run "$NIGHTLY" cargo --version
          cargo fuzz --version
      - name: Select fuzz duration
        id: duration
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [[ "$SCHEDULE" == '0 6 * * 6' ]]; then
            echo "seconds=1800" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=300" >> "$GITHUB_OUTPUT"
          fi
      - name: Fuzz ${{ matrix.target }} (${{ steps.duration.outputs.seconds }}s)
        working-directory: lang
        env:
          NIGHTLY: ${{ steps.versions.outputs.nightly }}
          FUZZ_TARGET: ${{ matrix.target }}
          FUZZ_SECONDS: ${{ steps.duration.outputs.seconds }}
        run: >-
          cargo +"$NIGHTLY" fuzz run "$FUZZ_TARGET"
          -- -max_total_time="$FUZZ_SECONDS"
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: lang/fuzz/artifacts/
