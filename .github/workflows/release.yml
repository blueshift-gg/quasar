name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

env:
  KANI_VERSION: 0.67.0
  PROGRAM_MSRV: 1.89.0
  SOLANA_VERSION: v4.1.1
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  checks: write
  issues: write

jobs:
  # ── Gate: full CI must pass before any release action ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    with:
      generated_client_smoke: true

  # ── Kani: formal verification of proof harnesses ──
  kani:
    name: Kani (${{ matrix.crate }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        crate: [quasar-lang, quasar-spl, quasar-metadata]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-kani-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-kani-${{ matrix.crate }}-
      - name: Install z3 (SMT solver for wide-type proofs)
        run: sudo apt-get install -y z3
      - name: Verify ${{ matrix.crate }}
        uses: model-checking/kani-github-action@v1
        with:
          kani-version: ${{ env.KANI_VERSION }}
          command: cargo kani -p ${{ matrix.crate }}
      - name: Print Kani toolchain
        run: cargo kani --version

  # ── CLI smoke: verify a fresh Solana project before publishing a tag ──
  release-cli-smoke:
    name: Release CLI Smoke
    needs: ci
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Build release smoke image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg SOLANA_VERSION=${{ env.SOLANA_VERSION }} \
            --file .github/docker/release-cli-smoke.Dockerfile \
            --tag quasar-release-cli-smoke:${{ github.sha }} \
            .

      - name: Run release smoke
        run: docker run --rm quasar-release-cli-smoke:${{ github.sha }}

  # ── Publish crates to crates.io in dependency order ──
  publish:
    name: Publish to crates.io
    needs: [ci, kani, release-cli-smoke]
    runs-on: ubuntu-24.04
    env:
      RUSTUP_TOOLCHAIN: 1.89.0
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.PROGRAM_MSRV }}

      - name: Print publication toolchain
        run: rustc --version && cargo --version

      - name: Validate release tag
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "quasar-lang") | .version')"
          if [ "${{ github.ref_name }}" != "v${version}" ]; then
            echo "tag ${{ github.ref_name }} does not match workspace version ${version}" >&2
            exit 1
          fi
          echo "QUASAR_VERSION=${version}" >> "$GITHUB_ENV"

      # Tier 0: no internal dependencies.
      - name: Publish quasar-schema
        run: scripts/publish-crate.sh quasar-schema "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish quasar-idl-schema
        run: scripts/publish-crate.sh quasar-idl-schema "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish quasar-profile
        run: scripts/publish-crate.sh quasar-profile "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish solana-compiler-builtins
        run: scripts/publish-crate.sh solana-compiler-builtins "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for tier 0
        run: |
          scripts/wait-for-crate.sh quasar-schema "$QUASAR_VERSION"
          scripts/wait-for-crate.sh quasar-idl-schema "$QUASAR_VERSION"
          scripts/wait-for-crate.sh quasar-profile "$QUASAR_VERSION"
          scripts/wait-for-crate.sh solana-compiler-builtins "$QUASAR_VERSION"

      # Tier 1: proc macros and IDL generator.
      - name: Publish quasar-derive
        run: scripts/publish-crate.sh quasar-derive "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish quasar-idl
        run: scripts/publish-crate.sh quasar-idl "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for tier 1
        run: |
          scripts/wait-for-crate.sh quasar-derive "$QUASAR_VERSION"
          scripts/wait-for-crate.sh quasar-idl "$QUASAR_VERSION"

      # Tier 2: runtime and CLI.
      - name: Publish quasar-lang
        run: scripts/publish-crate.sh quasar-lang "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish quasar-cli
        run: scripts/publish-crate.sh quasar-cli "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for quasar-lang
        run: scripts/wait-for-crate.sh quasar-lang "$QUASAR_VERSION"

      # Tier 3: runtime integrations.
      - name: Publish quasar-spl
        run: scripts/publish-crate.sh quasar-spl "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish quasar-metadata
        run: scripts/publish-crate.sh quasar-metadata "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for final tier
        run: |
          scripts/wait-for-crate.sh quasar-cli "$QUASAR_VERSION"
          scripts/wait-for-crate.sh quasar-spl "$QUASAR_VERSION"
          scripts/wait-for-crate.sh quasar-metadata "$QUASAR_VERSION"

  # ── GitHub Release with auto-generated notes ──
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
