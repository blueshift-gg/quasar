name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

env:
  HOST_RUST_VERSION: 1.92.0
  SOLANA_VERSION: v4.1.1
  SOLANA_LINUX_SHA256: a5c8e74b8ffa9ce906872b812849057c7fb21cf036ba08f219eb335e20fa4fb3
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Gate: full CI must pass before any release action ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Package rehearsal: exercise the unpublished archives before tagging ──
  package-rehearsal:
    name: Package Release Rehearsal
    needs: ci
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Require final stable JavaScript clients
        run: |
          npm view '@solana/kit@7.0.0' version | grep -Fx '7.0.0'
          npm view '@solana/web3.js@3.0.0' version | grep -Fx '3.0.0'

      - name: Build package rehearsal image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg SOLANA_VERSION=${{ env.SOLANA_VERSION }} \
            --build-arg SOLANA_LINUX_SHA256=${{ env.SOLANA_LINUX_SHA256 }} \
            --file .github/docker/release-package-rehearsal.Dockerfile \
            --tag quasar-release-package-rehearsal:${{ github.sha }} \
            .

      - name: Run package rehearsal
        run: docker run --rm quasar-release-package-rehearsal:${{ github.sha }}

      - name: Export the rehearsed package archives
        run: |
          image="quasar-release-package-rehearsal:${{ github.sha }}"
          container="$(docker create "$image")"
          trap 'docker rm -f "$container" >/dev/null' EXIT
          mkdir -p target/release-packages
          docker cp \
            "$container:/opt/quasar-release-rehearsal/archives/." \
            target/release-packages/
          docker cp \
            "$container:/opt/quasar-release-rehearsal/manifest.json" \
            target/release-packages/manifest.json
          docker rm "$container" >/dev/null
          trap - EXIT

      - name: Preserve the exact rehearsed archives
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quasar-release-packages-${{ github.sha }}
          path: target/release-packages
          if-no-files-found: error
          retention-days: 1

  # ── Publish crates to crates.io in dependency order ──
  publish:
    name: Publish to crates.io
    needs: [ci, package-rehearsal]
    runs-on: ubuntu-24.04
    env:
      RUSTUP_TOOLCHAIN: 1.92.0
    # This is the sole job that consumes the v0.1.0 bootstrap token. #330
    # configures its environment protection; #287 replaces it with OIDC.
    environment: crates-io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.HOST_RUST_VERSION }}

      - name: Restore the rehearsed package archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: quasar-release-packages-${{ github.sha }}
          path: target/release-packages

      - name: Print publication toolchain
        run: rustc --version && cargo --version

      - name: Validate release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="$(cargo run --locked -p quasar-release-tool -- graph --json \
            | jq -r '.version')"
          if [ "$REF_NAME" != "v${version}" ]; then
            echo "tag $REF_NAME does not match workspace version ${version}" >&2
            exit 1
          fi
          echo "QUASAR_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Publish release graph
        run: cargo run --locked -p quasar-release-tool -- publish --version "$QUASAR_VERSION" # zizmor: ignore[use-trusted-publishing] bootstrap token until crates.io OIDC migration
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release with auto-generated notes ──
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      # Required only for `gh release create` below.
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$REF_NAME" \
            --title "$REF_NAME" \
            --generate-notes
