name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

env:
  KANI_VERSION: 0.67.0
  PROGRAM_MSRV: 1.89.0
  SOLANA_VERSION: v4.1.1
  SOLANA_LINUX_SHA256: a5c8e74b8ffa9ce906872b812849057c7fb21cf036ba08f219eb335e20fa4fb3
  Z3_VERSION: 4.8.12-3.1build1
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Gate: full CI must pass before any release action ──
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    with:
      generated_client_smoke: true

  # ── Kani: formal verification of proof harnesses ──
  kani:
    name: Kani
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-kani-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-kani-
      - name: Install z3 (SMT solver for wide-type proofs)
        run: sudo apt-get install -y "z3=${{ env.Z3_VERSION }}"
      - name: Verify proof harnesses
        uses: model-checking/kani-github-action@2534b7aeb3c6b4b0a5ecc3981bb3e63d47b5b126 # v1
        with:
          kani-version: ${{ env.KANI_VERSION }}
          command: make kani
      - name: Print Kani toolchain
        run: cargo kani --version

  # ── Package rehearsal: exercise the unpublished archives before tagging ──
  package-rehearsal:
    name: Package Release Rehearsal
    needs: ci
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build package rehearsal image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg SOLANA_VERSION=${{ env.SOLANA_VERSION }} \
            --build-arg SOLANA_LINUX_SHA256=${{ env.SOLANA_LINUX_SHA256 }} \
            --file .github/docker/release-package-rehearsal.Dockerfile \
            --tag quasar-release-package-rehearsal:${{ github.sha }} \
            .

      - name: Run package rehearsal
        run: docker run --rm quasar-release-package-rehearsal:${{ github.sha }}

  # ── Publish crates to crates.io in dependency order ──
  publish:
    name: Publish to crates.io
    needs: [ci, kani, package-rehearsal]
    runs-on: ubuntu-24.04
    env:
      RUSTUP_TOOLCHAIN: 1.89.0
    # This is the sole job that consumes the v0.1.0 bootstrap token. #330
    # configures its environment protection; #287 replaces it with OIDC.
    environment: crates-io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.PROGRAM_MSRV }}

      - name: Print publication toolchain
        run: rustc --version && cargo --version

      - name: Validate release tag
        run: |
          version="$(cargo run --locked -p quasar-release-tool -- graph --json \
            | jq -r '.version')"
          if [ "${{ github.ref_name }}" != "v${version}" ]; then
            echo "tag ${{ github.ref_name }} does not match workspace version ${version}" >&2
            exit 1
          fi
          echo "QUASAR_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Package release graph
        run: cargo run --locked -p quasar-release-tool -- package --output target/release-packages

      - name: Publish release graph
        run: cargo run --locked -p quasar-release-tool -- publish --version "$QUASAR_VERSION"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release with auto-generated notes ──
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      # Required only for `gh release create` below.
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
