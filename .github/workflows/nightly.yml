name: Nightly assurance

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  HOST_RUST_VERSION: 1.92.0
  CARGO_LLVM_COV_VERSION: 0.8.7

jobs:
  coverage:
    name: Host coverage (informational)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.HOST_RUST_VERSION }}
          components: llvm-tools-preview
      - name: Install coverage tool
        run: cargo install cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --locked
      - name: Generate host report
        run: make coverage
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: host-coverage-html
          path: target/llvm-cov/html/

  kani:
    name: Kani (${{ matrix.crate }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        crate: [quasar-lang, quasar-spl]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Verify ${{ matrix.crate }}
        uses: model-checking/kani-github-action@2534b7aeb3c6b4b0a5ecc3981bb3e63d47b5b126 # v1
        with:
          kani-version: 0.67.0
          command: cargo kani -p ${{ matrix.crate }}
