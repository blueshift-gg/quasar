name: CI

on:
  push:
    branches: [master, 0.1.0-release]
  pull_request:
    branches: [master, 0.1.0-release]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: required-ci-${{ startsWith(github.ref, 'refs/tags/') && github.run_id || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  HOST_RUST_VERSION: 1.92.0
  SOLANA_VERSION: v4.1.1
  SOLANA_LINUX_SHA256: a5c8e74b8ffa9ce906872b812849057c7fb21cf036ba08f219eb335e20fa4fb3
  CARGO_TERM_COLOR: always

jobs:
  scope:
    name: Changed promise scope
    runs-on: ubuntu-24.04
    outputs:
      safety: ${{ steps.result.outputs.safety }}
      performance: ${{ steps.result.outputs.performance }}
      preview: ${{ steps.result.outputs.preview }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: changed
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            safety:
              - 'lang/**'
              - 'derive/**'
              - 'schema/**'
              - 'spl/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
            performance:
              - 'lang/**'
              - 'derive/**'
              - 'spl/**'
              - 'examples/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
            preview:
              - 'idl/**'
              - 'cli/src/client.rs'
              - 'cli/src/config.rs'
              - 'schema/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
      - id: result
        env:
          SAFETY_CHANGED: ${{ steps.changed.outputs.safety }}
          PERFORMANCE_CHANGED: ${{ steps.changed.outputs.performance }}
          PREVIEW_CHANGED: ${{ steps.changed.outputs.preview }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "safety=${SAFETY_CHANGED:-false}" >> "$GITHUB_OUTPUT"
            echo "performance=${PERFORMANCE_CHANGED:-false}" >> "$GITHUB_OUTPUT"
            echo "preview=${PREVIEW_CHANGED:-false}" >> "$GITHUB_OUTPUT"
          else
            echo "safety=true" >> "$GITHUB_OUTPUT"
            echo "performance=true" >> "$GITHUB_OUTPUT"
            echo "preview=true" >> "$GITHUB_OUTPUT"
          fi

  rust-quality:
    name: Rust quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.HOST_RUST_VERSION }}
          components: clippy,rustfmt
      - name: Format, lint, and document
        run: make format clippy doc-check
      - name: Validate workflow syntax
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          actionlint
      - name: Audit workflow security
        run: |
          cargo install zizmor --version 1.26.1 --locked
          zizmor .github/workflows

  core-host-tests:
    name: Core host tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.HOST_RUST_VERSION }}
      - name: Run stable crate and CLI behavior
        run: make test-host

  sbf-behavior:
    name: SBF behavior
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install supported Solana tools
        run: scripts/install-solana-tools.sh "$SOLANA_VERSION" "$SOLANA_LINUX_SHA256"
      - name: Exercise exact program behavior
        run: make build-sbf test-quasar-test-standalone test-sbf-host

  contracts:
    name: Contracts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: versions
        run: |
          echo "nightly=$(make nightly-version)" >> "$GITHUB_OUTPUT"
          echo "public_api=$(make cargo-public-api-version)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ steps.versions.outputs.nightly }}
          targets: x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-public-api@${{ steps.versions.outputs.public_api }}
      - name: Check stable APIs, macros, IDL, and generated clients
        run: make contracts

  package-journey:
    name: Package journey
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Build immutable package rehearsal
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg SOLANA_VERSION="$SOLANA_VERSION" \
            --build-arg SOLANA_LINUX_SHA256="$SOLANA_LINUX_SHA256" \
            --file .github/docker/release-package-rehearsal.Dockerfile \
            --tag quasar-release-package-rehearsal:${{ github.sha }} \
            .
      - name: Run source-free product journey
        run: |
          docker run --rm \
            --env ALLOW_MISSING_FINAL_WEB3=1 \
            quasar-release-package-rehearsal:${{ github.sha }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit@0.22.1
      - name: Audit reachable release dependencies
        run: make audit

  safety:
    name: Safety
    needs: scope
    if: needs.scope.outputs.safety == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: versions
        run: |
          echo "nightly=$(make nightly-version)" >> "$GITHUB_OUTPUT"
          echo "cargo_fuzz=$(make cargo-fuzz-version)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ steps.versions.outputs.nightly }}
          components: miri
      - name: Build fuzz targets
        env:
          NIGHTLY: ${{ steps.versions.outputs.nightly }}
          CARGO_FUZZ: ${{ steps.versions.outputs.cargo_fuzz }}
        run: |
          cargo +"$NIGHTLY" install cargo-fuzz --version "$CARGO_FUZZ" --locked
          make fuzz-build
      - name: Run unique unsafe contracts
        run: make miri

  kani:
    name: Safety / Kani
    needs: scope
    if: needs.scope.outputs.safety == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Verify language and SPL proof harnesses
        uses: model-checking/kani-github-action@2534b7aeb3c6b4b0a5ecc3981bb3e63d47b5b126 # v1
        with:
          kani-version: 0.67.0
          command: make kani

  performance:
    name: Performance
    needs: scope
    if: needs.scope.outputs.performance == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install supported Solana tools
        run: scripts/install-solana-tools.sh "$SOLANA_VERSION" "$SOLANA_LINUX_SHA256"
      - name: Enforce CU and binary-size budgets
        run: make build-sbf bench

  preview-clients:
    name: Preview clients
    needs: scope
    if: needs.scope.outputs.preview == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Check out the pinned C client headers
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: joeymeere/caravel
          ref: a0a88b705bc888a7ac3e8f7e506a1e997b374b4d
          path: .caravel
          persist-credentials: false
      - name: Generate Python, Go, and C explicitly
        run: |
          root="$(pwd)"
          temp="$(mktemp -d)"
          cp idl/tests/fixtures/programs/multisig.idl.json "$temp/multisig.json"
          cat >"$temp/Quasar.toml" <<'EOF'
          [project]
          name = "preview"
          [clients]
          path = "target/client"
          EOF
          cd "$temp"
          cargo run --manifest-path "$root/cli/Cargo.toml" -- client multisig.json --target python
          cargo run --manifest-path "$root/cli/Cargo.toml" -- client multisig.json --target go
          cargo run --manifest-path "$root/cli/Cargo.toml" -- client multisig.json --target c
          python3 -m py_compile target/client/python/*/*.py
          (cd target/client/go/* && go mod tidy && go test ./...)
          header="$(find target/client/c -name client.h -print -quit)"
          printf '#include "%s"\nint main(void) { return 0; }\n' "$header" \
            | clang -I "$root/.caravel/include" -x c -fsyntax-only -
