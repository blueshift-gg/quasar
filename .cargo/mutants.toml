# cargo-mutants configuration (shared by every package run).
#
# Package selection, mutation scope, and test-target flags live in
# scripts/mutants.sh — each package needs different oracle arguments, and a
# global examine list here would silently mis-scope them. This file holds only
# what is truly global.
#
# See TESTING.md ("Mutation testing") for the policy: the missed-mutant
# baseline in .ci/mutants-baseline.txt only shrinks; a new missed mutant
# fails the nightly run.

# SBF-only code cannot be exercised by host tests: mutants there would be
# unkillable noise, and its assurance comes from the SVM suite, Miri, and
# Kani instead (tracked per feature in tests/feature-matrix.tsv).
exclude_globs = [
    "lang/src/entrypoint.rs",
    "lang/src/svm.rs",
    "lang/src/svm_abi.rs",
    "lang/src/idl_build.rs",
]

# Proc-macro and codegen test cycles rebuild dependents; give slow test
# targets generous headroom before a mutant is classed as a timeout.
timeout_multiplier = 3.0
build_timeout_multiplier = 3.0
minimum_test_timeout = 60.0
