[package]
name = "zeropod"
version = "0.3.3"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/blueshift-gg/zeropod"
description = "Zero-copy pod types with derive macros. Alignment-1 representations for zero-overhead data access."

[features]
default = []
kani = []
wincode = ["dep:wincode"]
solana-address = ["dep:solana-address"]
solana-program-error = ["dep:solana-program-error"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }

[dependencies]
zeropod-derive = { version = "=0.3.3", path = "../zeropod-derive" }
wincode = { version = "0.5", features = ["derive"], optional = true }
solana-address = { version = ">=2.2, <3", optional = true, features = ["copy"] }
solana-program-error = { version = ">=1.0, <4.0", optional = true }
